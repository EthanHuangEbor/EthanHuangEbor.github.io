<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="assets/img/dog-avatar.png" type="image/png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <aside class="sidebar" aria-label="主导航">
    <a class="brand" href="#/home" aria-label="回到首页">
      <span class="brand-mark" id="brandAvatar"><img src="assets/img/dog-avatar.png" alt="小狗头像" /></span>
      <span>
        <strong id="brandName">Ethan Huang</strong>
        <small id="brandTitle">BUAA · Propulsion</small>
      </span>
    </a>

    <nav class="nav" id="mainNav">
      <a href="#/home" data-route="home">首页</a>
      <a href="#/cv" data-route="cv">科研经历</a>
      <a href="#/knowledge" data-route="knowledge">知识花园</a>
      <a href="#/life" data-route="life">生活</a>
    </nav>

    <div class="sidebar-note">
      <span class="note-kicker">Now</span>
      <p>Projects, notes, and field records.</p>
    </div>

  <header class="mobile-bar">
    <a class="mobile-brand" href="#/home"><span class="brand-mark"><img src="assets/img/dog-avatar.png" alt="小狗头像" /></span><strong>Ethan Huang</strong></a>
    <button class="menu-button" id="menuButton" aria-expanded="false" aria-controls="mainNav">目录</button>
    <nav class="mobile-nav" aria-label="移动端导航">
      <a href="#/home">首页</a>
      <a href="#/cv">科研</a>
      <a href="#/knowledge">知识</a>
      <a href="#/life">生活</a>
    </nav>

  <main class="app-shell" id="app" tabindex="-1">
    <section class="loading-card">
      <p>Loading engineering garden...</p>
    </section>
  </main>

  <template id="articleTemplate">
    <article class="article-panel">
      <header class="article-header">
        <p class="eyebrow"></p>
        <h1></h1>
        <p class="summary"></p>
        <div class="tag-row"></div>
      </header>
      <div class="article-body prose"></div>
    </article>
  </template>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
